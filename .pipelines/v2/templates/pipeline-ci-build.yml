variables:
  - name: runCodesignValidationInjectionBG
    value: false
  - name: EnablePipelineCache
    value: true
  - ${{ if eq(parameters.enableMsBuildCaching, true) }}:
      - name: EnablePipelineCache
        value: true

parameters:
  - name: buildPlatforms
    type: object
    default:
      - x64
      - arm64
  - name: enableMsBuildCaching
    type: boolean
    default: false
  - name: runTests
    type: boolean
    default: true
  - name: useVSPreview
    type: boolean
    default: false

stages:
  # Allow manual builds to skip pre-check
  - ${{ if ne(variables['Build.Reason'], 'Manual') }}:
      - stage: Precheck
        jobs:
          - template: job-ci-precheck.yml

  - ${{ each platform in parameters.buildPlatforms }}:
      - stage: Build_${{ platform }}
        displayName: Build ${{ platform }}
        ${{ if ne(variables['Build.Reason'], 'Manual') }}:
          dependsOn: [Precheck]
          condition: and(succeeded(), ne(dependencies.Precheck.outputs['Precheck.verifyBuildRequest.skipBuild'], 'Yes'))
        ${{ else }}:
          dependsOn: []
        jobs:
          - template: job-build-project.yml
            parameters:
              pool:
                ${{ if eq(variables['System.CollectionId'], 'cb55739e-4afe-46a3-970f-1b49d8ee7564') }}:
                  name: SHINE-INT-L
                ${{ else }}:
                  name: SHINE-OSS-L
                ${{ if eq(parameters.useVSPreview, true) }}:
                  demands: ImageOverride -equals SHINE-VS17-Preview
              buildPlatforms:
                - ${{ platform }}
              variables:
                IsPipeline: 1 # The installer uses this to detect whether it should pick up localizations
                SkipCppCodeAnalysis: 1 # Skip the code analysis to speed up release CI. It runs on PR CI, anyway
              buildConfigurations: [Release]
              enablePackageCaching: true
              enableMsBuildCaching: ${{ parameters.enableMsBuildCaching }}
              runTests: ${{ parameters.runTests }}
              useVSPreview: ${{ parameters.useVSPreview }}

      - ${{ if eq(parameters.runTests, true) }}:
          - stage: Test_${{ platform }}
            displayName: Test ${{ platform }}
            dependsOn:
              - Build_${{platform}}
            jobs:
              - template: job-test-project.yml
                parameters:
                  platform: ${{ platform }}
                  configuration: Release

      - stage: Fuzz
        displayName: Fuzz ${{ platform }}
        dependsOn:
          - Build_${{platform}}
        jobs:
          - template: job-fuzz.yml
            parameters:
              platform: ${{ platform }}
              configuration: Release
              inputArtifactStem: ""
